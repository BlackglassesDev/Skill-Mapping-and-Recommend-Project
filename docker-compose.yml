version: '3.8'

services:
  app:
    build: .
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    env_file:
      - .env  # เพิ่มบรรทัดนี้ครับ
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
  

  # --- เพิ่ม Caddy เข้ามาจัดการ HTTPS ---
  gateway:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # --- เลื่อนก้อนนี้ขึ้นมาตรงนี้ (ลบออกก่อนdeploy on server)---
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    environment:
      - PMA_HOST=db
      - UPLOAD_LIMIT=64M
    depends_on:
      - db

# --- ส่วนท้ายสุดของไฟล์ ---
volumes:
  db_data:
  caddy_data:   # เก็บใบเซอร์ SSL
  caddy_config: # เก็บการตั้งค่า Caddy